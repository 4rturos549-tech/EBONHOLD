# AzerothCore WoTLK 3.3.5a - stack de desarrollo local
# Basado en las imagenes oficiales: https://www.azerothcore.org/wiki/install-with-docker
#
# Uso:
#   1) Asegurate de que Docker Desktop esta corriendo.
#   2) Coloca el cliente 3.3.5a limpio (carpeta WoW completa) en client-data/
#      o ajusta la ruta del volumen "client-data" en el servicio ac-tools.
#   3) Primera vez:
#         docker compose --profile tools up ac-tools     # extrae mapas/dbc/vmaps/mmaps
#         docker compose up -d ac-database               # arranca MySQL
#         docker compose run --rm ac-db-import           # crea/actualiza las 3 BDs
#         docker compose up -d                           # arranca authserver + worldserver
#   4) Para entrar al worldserver (consola GM):
#         docker attach azerothcore-worldserver
#   5) Logs:
#         docker compose logs -f ac-worldserver
#
# Puertos publicados:
#   3724  -> authserver (login)
#   8085  -> worldserver (juego)
#   3306  -> MySQL (solo para herramientas; no exponer en produccion)
#   7878  -> SOAP (opcional, para integrar con la web)

services:
  ac-database:
    # MySQL 8.0 (no 8.4) — AzerothCore necesita el plugin mysql_native_password
    # que 8.4 eliminó por defecto.
    image: mysql:8.0
    container_name: azerothcore-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: azerothcore
      MYSQL_ROOT_HOST: "%"
    command: >-
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --sql-mode=""
    volumes:
      - ac-db-data:/var/lib/mysql
    ports:
      - "127.0.0.1:3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pazerothcore"]
      interval: 10s
      timeout: 5s
      retries: 10

  ac-db-import:
    image: acore/ac-wotlk-db-import:14.0.0-dev
    container_name: azerothcore-db-import
    depends_on:
      ac-database:
        condition: service_healthy
    environment:
      AC_LOGIN_DATABASE_INFO: "ac-database;3306;root;azerothcore;acore_auth"
      AC_WORLD_DATABASE_INFO: "ac-database;3306;root;azerothcore;acore_world"
      AC_CHARACTER_DATABASE_INFO: "ac-database;3306;root;azerothcore;acore_characters"
    restart: "no"

  # Extraccion de datos del cliente WoW (mapas, dbc, vmaps, mmaps).
  # Se corre UNA VEZ tras copiar el cliente a client-data/.
  # Tarda 30-50 min. Despues no se usa nunca mas.
  #
  # Uso:
  #   docker compose --profile extract up ac-extract
  ac-extract:
    image: acore/ac-wotlk-tools:14.0.0-dev
    container_name: ebonhold-extract
    profiles: ["extract"]
    volumes:
      - ./client-data:/azerothcore/env/dist/data
    working_dir: /azerothcore/env/dist/data
    entrypoint: ["bash", "-c"]
    command:
      - |
        set -e
        echo "=== 1/4 map_extractor (~3 min) ==="
        /azerothcore/env/dist/bin/map_extractor
        echo "=== 2/4 vmap4_extractor (~10 min) ==="
        /azerothcore/env/dist/bin/vmap4_extractor
        echo "=== 3/4 vmap4_assembler (~3 min) ==="
        mkdir -p vmaps
        /azerothcore/env/dist/bin/vmap4_assembler Buildings vmaps
        echo "=== 4/4 mmaps_generator (~20 min) ==="
        mkdir -p mmaps
        /azerothcore/env/dist/bin/mmaps_generator
        echo "=== EXTRACT DONE ==="

  # Bridge HTTP API: expone read-queries + registro de cuentas
  # via HTTP (puerto 4000) para que Cloudflare Tunnel lo exponga
  # a internet y Vercel lo consuma desde la web publica.
  # Ver docs/cloudflare-tunnel.md para la configuracion.
  ac-bridge:
    build: ./bridge
    image: ebonhold/bridge:latest
    container_name: ebonhold-bridge
    restart: unless-stopped
    depends_on:
      ac-database:
        condition: service_healthy
    environment:
      BRIDGE_PORT: "4000"
      BRIDGE_KEY: "${BRIDGE_KEY:-changeme-set-in-env}"
      ACORE_DATABASE_URL: "mysql://root:azerothcore@ac-database:3306/"
    ports:
      - "127.0.0.1:4000:4000"

  ac-worldserver:
    image: acore/ac-wotlk-worldserver:14.0.0-dev
    container_name: azerothcore-worldserver
    restart: unless-stopped
    depends_on:
      ac-database:
        condition: service_healthy
    tty: true
    stdin_open: true
    ports:
      - "8085:8085"
      - "7878:7878"
    environment:
      AC_LOGIN_DATABASE_INFO: "ac-database;3306;root;azerothcore;acore_auth"
      AC_WORLD_DATABASE_INFO: "ac-database;3306;root;azerothcore;acore_world"
      AC_CHARACTER_DATABASE_INFO: "ac-database;3306;root;azerothcore;acore_characters"
      AC_DATA_DIR: "/azerothcore/env/dist/data"
    volumes:
      - ./client-data:/azerothcore/env/dist/data:ro
      - ./var/worldserver:/azerothcore/env/dist/var

  ac-authserver:
    image: acore/ac-wotlk-authserver:14.0.0-dev
    container_name: azerothcore-authserver
    restart: unless-stopped
    depends_on:
      ac-database:
        condition: service_healthy
    ports:
      - "3724:3724"
    environment:
      AC_LOGIN_DATABASE_INFO: "ac-database;3306;root;azerothcore;acore_auth"
    volumes:
      - ./var/authserver:/azerothcore/env/dist/var

volumes:
  ac-db-data:
