<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <!-- Halo radial de fondo -->
    <radialGradient id="halo" cx="0.5" cy="0.5" r="0.55">
      <stop offset="0%" stop-color="#6ec8f0" stop-opacity="0.35"/>
      <stop offset="45%" stop-color="#3a7fa5" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#6ec8f0" stop-opacity="0"/>
    </radialGradient>

    <!-- Anillo exterior con bevel metalico -->
    <linearGradient id="outerRing" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e6f6ff"/>
      <stop offset="25%" stop-color="#a8ddf5"/>
      <stop offset="55%" stop-color="#6ec8f0"/>
      <stop offset="80%" stop-color="#3a7fa5"/>
      <stop offset="100%" stop-color="#1a4060"/>
    </linearGradient>

    <linearGradient id="ringInnerBevel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a3d56"/>
      <stop offset="50%" stop-color="#0a1828"/>
      <stop offset="100%" stop-color="#2a5a7a"/>
    </linearGradient>

    <!-- Fondo interior (cripta) -->
    <radialGradient id="cryptBg" cx="0.5" cy="0.5" r="0.7">
      <stop offset="0%" stop-color="#0e1928"/>
      <stop offset="60%" stop-color="#070f1a"/>
      <stop offset="100%" stop-color="#02060c"/>
    </radialGradient>

    <!-- Hoja del shard (Frostmourne abstracto) -->
    <linearGradient id="blade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.98"/>
      <stop offset="20%" stop-color="#e6f6ff" stop-opacity="0.92"/>
      <stop offset="50%" stop-color="#a8ddf5" stop-opacity="0.82"/>
      <stop offset="80%" stop-color="#6ec8f0" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#3a7fa5" stop-opacity="0.4"/>
    </linearGradient>

    <linearGradient id="bladeFacet" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3a7fa5" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#1a4060" stop-opacity="0.5"/>
    </linearGradient>

    <!-- Nucleo brillante -->
    <radialGradient id="core" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="30%" stop-color="#d9f4ff" stop-opacity="0.95"/>
      <stop offset="70%" stop-color="#6ec8f0" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#6ec8f0" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="cardinalGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="40%" stop-color="#a8ddf5" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#6ec8f0" stop-opacity="0"/>
    </radialGradient>

    <!-- Filtro de glow suave -->
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 1. Halo exterior -->
  <circle cx="128" cy="128" r="124" fill="url(#halo)"/>

  <!-- 2. Diamante exterior con gradiente metalico -->
  <path d="M128 10 L246 128 L128 246 L10 128 Z" fill="url(#outerRing)"/>

  <!-- 3. Borde inner bevel (anillo oscuro entre exterior e interior) -->
  <path d="M128 22 L234 128 L128 234 L22 128 Z M128 36 L220 128 L128 220 L36 128 Z"
        fill="url(#ringInnerBevel)" fill-rule="evenodd"/>

  <!-- 4. Fondo de la cripta (interior obsidiana) -->
  <path d="M128 36 L220 128 L128 220 L36 128 Z" fill="url(#cryptBg)"/>

  <!-- 5. Anillo decorativo intermedio -->
  <path d="M128 50 L206 128 L128 206 L50 128 Z"
        fill="none" stroke="#3a7fa5" stroke-width="0.6" opacity="0.45"/>

  <!-- 6. Mini diamantes en las 4 caras del anillo intermedio -->
  <g fill="#6ec8f0">
    <path d="M128 38 L131.5 44 L128 50 L124.5 44 Z" opacity="0.7"/>
    <path d="M218 128 L212 131.5 L206 128 L212 124.5 Z" opacity="0.7"/>
    <path d="M128 218 L131.5 212 L128 206 L124.5 212 Z" opacity="0.7"/>
    <path d="M38 128 L44 131.5 L50 128 L44 124.5 Z" opacity="0.7"/>
  </g>

  <!-- 7. Estrellas de 8 puntas en las diagonales -->
  <g fill="#a8ddf5" opacity="0.7">
    <path d="M70 70 L72 76 L78 78 L72 80 L70 86 L68 80 L62 78 L68 76 Z"/>
    <path d="M186 70 L188 76 L194 78 L188 80 L186 86 L184 80 L178 78 L184 76 Z"/>
    <path d="M70 186 L72 180 L78 178 L72 176 L70 170 L68 176 L62 178 L68 180 Z"/>
    <path d="M186 186 L188 180 L194 178 L188 176 L186 170 L184 176 L178 178 L184 180 Z"/>
  </g>

  <!-- 8. Halo bajo el shard -->
  <ellipse cx="128" cy="128" rx="22" ry="68" fill="#6ec8f0" opacity="0.25" filter="url(#softGlow)"/>

  <!-- 9. Shard principal (kite / hoja vertical) con facetas -->
  <path d="M128 56 L148 128 L128 200 L108 128 Z" fill="url(#blade)" stroke="#d9f4ff" stroke-width="0.8"/>
  <!-- faceta lado derecho -->
  <path d="M128 56 L148 128 L128 200 Z" fill="url(#bladeFacet)" opacity="0.4"/>

  <!-- 10. Linea central del shard -->
  <line x1="128" y1="56" x2="128" y2="200" stroke="#ffffff" stroke-width="0.9" opacity="0.85"/>

  <!-- 11. Lineas de talla (facets) en el shard -->
  <line x1="128" y1="80" x2="142" y2="128" stroke="#ffffff" stroke-width="0.4" opacity="0.4"/>
  <line x1="128" y1="80" x2="114" y2="128" stroke="#ffffff" stroke-width="0.4" opacity="0.4"/>
  <line x1="128" y1="176" x2="142" y2="128" stroke="#3a7fa5" stroke-width="0.4" opacity="0.6"/>
  <line x1="128" y1="176" x2="114" y2="128" stroke="#3a7fa5" stroke-width="0.4" opacity="0.6"/>

  <!-- 12. Nucleo brillante en el centro -->
  <circle cx="128" cy="128" r="18" fill="url(#core)"/>
  <circle cx="128" cy="128" r="4" fill="#ffffff"/>
  <circle cx="128" cy="128" r="2" fill="#e6f6ff"/>

  <!-- 13. Puntas brillantes (4 cardinales del diamante exterior) -->
  <g>
    <circle cx="128" cy="10"  r="7" fill="url(#cardinalGlow)"/>
    <circle cx="246" cy="128" r="7" fill="url(#cardinalGlow)"/>
    <circle cx="128" cy="246" r="7" fill="url(#cardinalGlow)"/>
    <circle cx="10"  cy="128" r="7" fill="url(#cardinalGlow)"/>
    <circle cx="128" cy="10"  r="2.5" fill="#ffffff"/>
    <circle cx="246" cy="128" r="2.5" fill="#ffffff"/>
    <circle cx="128" cy="246" r="2.5" fill="#ffffff"/>
    <circle cx="10"  cy="128" r="2.5" fill="#ffffff"/>
  </g>
</svg>
